name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      # 仓库级测试套件(与 package.json test 脚本一致)。插件运行时(media-ops/office-suite)
      # 是自带 package.json+lockfile 的子项目,裸 bun test 会在未装其依赖的情况下捞进它们的
      # 测试导致必红(zod 缺失),故显式限定路径。
      - run: bun test ./tests/
      - run: bun run build
      - run: bun run lint:brand
      - run: bun run scripts/lint-brand.ts dist
      - run: bun run validate
