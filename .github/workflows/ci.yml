name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      # 仓库级测试套件(与 package.json test 脚本一致)。插件运行时(media-ops/office-suite)
      # 是自带 package.json+lockfile 的子项目,裸 bun test 会在未装其依赖的情况下捞进它们的
      # 测试导致必红(zod 缺失),故显式限定路径。
      - run: bun test ./tests/
      - run: bun run build
      - run: bun run lint:brand
      - run: bun run scripts/lint-brand.ts dist
      - run: bun run validate
      - name: Verify media-ops standalone bundle is committed
        run: git ls-files --error-unmatch plugins/crabcode-media-ops/dist/server.js

  html-video-plugin:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: plugins/crabcode-html-video

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run build:mcp
      - run: bun test ./tests ./packages
      - run: bun run check:distribution
      - name: Verify committed standalone bundle is complete and current
        run: |
          git ls-files --error-unmatch dist/bootstrap.js dist/server.js dist/hyperframe.manifest.json dist/hyperframe.runtime.iife.js
          test -z "$(git status --porcelain -- dist)"

  media-ops-plugin:
    runs-on: ubuntu-24.04
    container:
      image: mcr.microsoft.com/playwright:v1.61.1-noble@sha256:5b8f294aff9041b7191c34a4bab3ac270157a28774d4b0660e9743297b697e48
      options: --ipc=host

    defaults:
      run:
        working-directory: plugins/crabcode-media-ops

    steps:
      - uses: actions/checkout@v4
      # The Playwright container image ships without unzip, which oven-sh/setup-bun
      # needs to unpack the bun release archive. Without it setup-bun fails and the
      # whole job (check:distribution + QA) never runs on Linux. Install it first.
      # Verified against the pinned image by local container reproduction (audit 2026-07-18).
      - name: Install unzip (Playwright image lacks it; required by setup-bun)
        run: apt-get update && apt-get install -y --no-install-recommends unzip
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      # check:distribution rebuilds into a temp dir and compares against the
      # committed dist/server.js, then cold-start smokes it — so it must run
      # before anything overwrites the checked-out bundle.
      - run: bun run check:distribution
      - run: bun run test
      - run: bun run test:qa
      - run: bun run qa:release
      - run: bun run validate
      - name: Upload media QA evidence on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: media-ops-qa-evidence
          path: plugins/crabcode-media-ops/test-results
          if-no-files-found: ignore
